apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: audit-guardrail-changes-test
policies:
  - ../../../policies/kyverno/audit/audit-guardrail-changes.yaml
resources:
  - resources/guardrail-configmap.yaml
  - resources/regular-configmap.yaml
results:
  - policy: audit-guardrail-changes
    rule: log-guardrail-change
    resources:
      - blocked-operators
    kind: ConfigMap
    result: fail
  - policy: audit-guardrail-changes
    rule: log-guardrail-change
    resources:
      - unrelated-config
    kind: ConfigMap
    result: skip
