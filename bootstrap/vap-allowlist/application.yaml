apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: operator-guardrails-allowlist
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: operator-guardrails
spec:
  project: operator-guardrails
  source:
    repoURL: https://github.com/stefan-bergstein/operator-guardrails.git
    targetRevision: main
    path: policies/vap/allowlist-stormshift-ocp5
  destination:
    server: https://kubernetes.default.svc
    namespace: operator-guardrails
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
