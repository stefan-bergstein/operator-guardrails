apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: allow-operator-subscriptions
  labels:
    app.kubernetes.io/part-of: operator-guardrails
spec:
  failurePolicy: Fail
  paramKind:
    apiVersion: v1
    kind: ConfigMap
  matchConstraints:
    resourceRules:
      - apiGroups: ["operators.coreos.com"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["subscriptions"]
  matchConditions:
    - name: has-spec-name
      expression: "has(object.spec) && has(object.spec.name)"
  variables:
    - name: allowedPackages
      expression: "params.data.packages.split(',')"
    - name: operatorName
      expression: "object.spec.name"
  validations:
    - expression: "variables.allowedPackages.exists(p, p.trim() == variables.operatorName)"
      messageExpression: "'The operator \"' + variables.operatorName + '\" is not on the approved list. Contact your cluster administrator to request approval.'"
