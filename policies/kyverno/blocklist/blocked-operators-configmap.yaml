apiVersion: v1
kind: ConfigMap
metadata:
  name: blocked-operators
  namespace: kyverno
  labels:
    app.kubernetes.io/part-of: operator-guardrails
data:
  # Comma-separated list of OLM package names to block.
  # To block or unblock an operator, edit this list and re-apply:
  #   oc apply -f policies/blocked-operators-configmap.yaml
  #
  packages: >-
    ansible-automation-platform-operator,
    serverless-operator,
    openshift-pipelines-operator-rh,
    servicemeshoperator,
    cluster-logging,
    compliance-operator
