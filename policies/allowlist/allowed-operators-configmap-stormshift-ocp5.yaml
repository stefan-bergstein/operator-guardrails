apiVersion: v1
kind: ConfigMap
metadata:
  name: allowed-operators
  namespace: kyverno
  labels:
    app.kubernetes.io/part-of: operator-guardrails
data:
  # Comma-separated list of OLM package names to allow.
  # Only operators in this list may be installed. All others are denied.
  # To update the list, edit and re-apply:
  #   oc apply -f policies/allowlist/allowed-operators-configmap-stormshift-ocp5.yaml
  #
  packages: >-
    advanced-cluster-management,
    cluster-kube-descheduler-operator,
    devworkspace-operator,
    external-secrets-operator,
    kubernetes-imagepuller-operator,
    kubernetes-nmstate-operator,
    kubevirt-hyperconverged,
    lightspeed-operator,
    metallb-operator,
    mtv-operator,
    multicluster-engine,
    openshift-cert-manager-operator,
    openshift-gitops-operator,
    openshift-pipelines-operator-rh,
    redhat-oadp-operator,
    rhbk-operator,
    rhods-operator,
    rhsso-operator,
    serverless-operator,
    web-terminal